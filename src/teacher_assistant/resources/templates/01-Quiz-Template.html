
<!-- Classroom assessments template -->
 <div>
    <!-- Header of the paper(student name, assessment title, time)-->
     <div style="margin-left: 20px; margin-right: 20px;">
    <table>
        <tr>
            <td style="border:none; width: 50%;">--Title--: --TitleValue--</td>
            <td style="border:none; width: 50%;">--Date--: --DateValue--</td>
        </tr>
        <tr>
            <td style="border:none; width: 50%;"></td>
            <td style="border:none; width: 50%;">--Time--: --TimeValue--</td>
        </tr>
        <tr>
            <td style="border:none; width: 50%;">--Student Name--: --StudentNameValue--</td>
            <td style="border:none; width: 50%;">--Duration--: --DurationValue--</span> --Time Unit--</td>
        </tr>
    </table>
</div>
    <!-- Subsequent Rows: the content of assessment for each row -->
    <table>
        <!-- header of the quiz table (row, title, score) -->
        <tr>
            <td style="text-align: center;">--Row--</td>
            <td style="text-align: center;">--Header--</td>
            <td style="text-align: center;">--Score--</td>
        </tr>
    <!-- Do not remove following comemnted line, that is used as a placeholder to replace new content -->
    <!-- NEW CONTENT PLACEHOLDER -->
        <tr>
            <td></td>
            <td style="text-align: end;">--Total Score--</td>
            <td style="text-align: center;">--TotalScoreValue--</td>
        </tr>
    </table>
</div>
