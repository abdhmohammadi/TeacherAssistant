            <style id="preserved-styles">
            /* ===== BODY: dark background ===== */
            body 
            {
                background: #0b1120;
                margin: 0;
                overflow-x: auto;
                
            }

            /* ===== Custom Scrollbar ===== */
            html 
            {
                scrollbar-width: thin;
                scrollbar-color: #555 #0b1120;
            }
            html::-webkit-scrollbar { width: 4px; height: 4px; }
            html::-webkit-scrollbar-track { background: #0b1120; border-radius: 2px; }
            html::-webkit-scrollbar-thumb { background: #555; border-radius: 1px; }
            html::-webkit-scrollbar-thumb:hover { background: #777; }
            
            .math-formula 
            {
                display: inline-block;
                cursor: pointer;
                padding: 2px;
                direction:"ltr";
            }

            .math-editor
             {
                min-width: 80px;
                border: 1px solid #999;
                padding: 2px 4px;
                font-family: monospace;
                background: #fffef0;
                direction:"ltr";
            }
            /* ===== PAGES WRAPPER ===== */
            .pages-wrapper 
            {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                padding: 0px;
                min-height: 100vh;
            }

            /* ===== PAGE: white sheet with shadow ===== */
            .page 
            {
                width: 210mm;
                height: 297mm;
                background: white;
                box-shadow: 0 0 10px rgba(0,0,0,0.35);
                padding: 10mm 10mm
                         10mm 10mm;
                box-sizing: border-box;
                outline: none;
                overflow: hidden;
                flex-shrink: 0;
            }
            .readonly-overlay
            {
                position:absolute; 
                top:0; 
                left:0; 
                width:100%; 
                height:100%; 
                z-index:9999; 
                display:none;
            }
            /* ===== Print styles ===== */
            @media print 
            {
                html, body 
                {
                    margin: 0 !important;
                    padding: 0 !important;
                    overflow: hidden !important;
                    background: white !important;
                }
                .pages-wrapper 
                {
                    gap: 0 !important;
                    padding: 0 !important;
                }
                .page 
                {
                    width: 100% !important;
                    height: auto !important;
                    min-height: 0 !important;
                    box-shadow: none !important;
                    margin: 0 !important;
                    page-break-after: always;
                    break-after: page;
                    overflow: visible !important;
                }
                .page:last-child 
                {
                    page-break-after: auto;
                    break-after: auto;
                }
            }

            /* ===== IMAGE WRAPPER (float, relative, margin-based move) ===== */
            .img-wrapper 
            {
                float: left;
                position: relative;
                cursor: move;
                line-height: 0;
                margin: 4px;
                max-width: 100%;
            }
            .img-wrapper img 
            {
                display: block;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            /* Resize handles (absolute, inside the wrapper) — hidden by default */
            .img-wrapper .resize-handle 
            {
                position: absolute;
                width: 10px;
                height: 10px;
                background: #fff;
                border: 1px solid #666;
                box-sizing: border-box;
                z-index: 10;
                opacity: 0;
                transition: opacity 0.15s ease;
                pointer-events: none;
            }
            /* Show handles when wrapper has .handles-visible class (added by JS) */
            .img-wrapper.handles-visible .resize-handle 
            {
                opacity: 1;
                pointer-events: auto;
            }
            .handle-nw { top: -5px; left: -5px; cursor: nwse-resize; }
            .handle-n  { top: -5px; left: 50%; margin-left: -5px; cursor: ns-resize; }
            .handle-ne { top: -5px; right: -5px; cursor: nesw-resize; }
            .handle-e  { top: 50%; margin-top: -5px; right: -5px; cursor: ew-resize; }
            .handle-se { bottom: -5px; right: -5px; cursor: nwse-resize; }
            .handle-s  { bottom: -5px; left: 50%; margin-left: -5px; cursor: ns-resize; }
            .handle-sw { bottom: -5px; left: -5px; cursor: nesw-resize; }
            .handle-w  { top: 50%; margin-top: -5px; left: -5px; cursor: ew-resize; }

            /* ===== TABLE styles ===== */
            table 
            {
                border-collapse: collapse;
                width: 100%;
                margin: 10px 0;
            }
            td, th 
            {
                border: 1px solid #aaa;
                padding: 4px 8px;
                vertical-align: top;
                min-width: 40px;
                position: relative;
            }
            .col-resize-handle 
            {
                position: absolute;
                right: 0; top: 0; bottom: 0;
                width: 5px;
                cursor: col-resize;
                background: transparent;
                z-index: 5;
            }

            /* ===== MATH ERROR styling ===== */
            .katex-error 
            {
                color: #cc0000;
                background: #fff0f0;
                padding: 1px 3px;
                border-radius: 2px;
                font-style: italic;
            }

        </style>
        
            
            
            <script>
            /**
            * Sets width and height for all .page elements, applying 'auto' fallback with max constraints.
            * @param {string} widthStr - The desired width value (e.g., "210" or "auto")
            * @param {string} heightStr - The desired height value (e.g., "297" or "auto")
            */
            function setPageDimensions(widthStr, heightStr) 
            {
                // Select all elements with class 'page' and iterate over each one
                document.querySelectorAll('.page').forEach(function(p) 
                {
                    // Parse the width value as a floating-point number
                    let num = parseFloat(widthStr);

                    // Validate if the parsed number is a valid finite real number and matches a real number pattern
                    let isValid = !isNaN(num) && isFinite(num) && /^-?\d*\.?\d+$/.test(String(widthStr));

                    // If valid, set width to the numeric value + "mm"; otherwise set to "auto"
                    p.style.width = isValid ? num + "mm" : "auto";

                    // If the computed width becomes "auto", set a maximum width of 210mm to prevent excessive expansion
                    if (p.style.width === "auto") p.style.maxWidth = "210mm";

                    // Parse the height value similarly
                    num = parseFloat(heightStr);

                    // Validate the height value using the same real‑number pattern
                    isValid = !isNaN(num) && isFinite(num) && /^-?\d*\.?\d+$/.test(String(heightStr));

                    // Set height accordingly (valid → numeric + "mm", invalid → "auto")
                    p.style.height = isValid ? num + "mm" : "auto";

                    // If height is "auto", set a maximum height of 297mm (standard A4 portrait)

                pages = document.querySelectorAll('.page');
                
                for (var i = pages.length - 2; i >= 0; i--) pullUnderflow(pages[i]);
                
                removeEmptyPagesAndFixFocus();
                
                // Update page count
                var count = document.querySelectorAll('.page').length;
                var wrapper = document.querySelector('.pages-wrapper');
                
                if (wrapper) wrapper.setAttribute('data-page-count', count);
                var pn = 1;
                document.querySelectorAll('.page').forEach(function(p) 
                {
                    p.setAttribute('page-number', pn);
                    pn = pn + 1;
                });
                // Check if the focused page still exists in DOM
                if (focusedPage && document.contains(focusedPage)) 
                {
                    focusedPageStillExists = true;
                }
            } finally 
            {
                window._pageCheckRunning = false;
            }
            
            // Restore focus if the page was removed or focus was lost
            if (focusedPage && !focusedPageStillExists) 
            {
                var allPages = document.querySelectorAll('.page');
                if (allPages.length > 0) {
                    var target = allPages[allPages.length - 1];
                    target.focus();
                    var sel = window.getSelection();
                    var r = document.createRange();
                    r.selectNodeContents(target);
                    r.collapse(false); // cursor at end
                    sel.removeAllRanges();
                    sel.addRange(r);
                }
            }

            // Restore scroll position
            //window.scrollTo(scrollX, scrollY);
            if (!window.cursorMovedToAnotherPage)
            {
                window.scrollTo(scrollX, scrollY);
            }

            window.cursorMovedToAnotherPage = false;
        }

        // Backward-compatible aliases
        var updatePageBreaks = checkAllPages;
        var updatePageGuides = checkAllPages;

        // -- Debounced schedule --
        window._pageCheckTimer = null;
        
        window._pageCheckQueued = false;

        window.schedulePageCheck = function()
        {
            if (window._pageCheckQueued) return;

            window._pageCheckQueued = true;

            requestAnimationFrame(function()
            {
                window._pageCheckQueued = false;
                checkAllPages();
            });
        };

        window.schedulePageBreakUpdate = window.schedulePageCheck;

        // -- MutationObserver for a single page --
        function setupPageObserver(pageEl) 
        {
            if (!pageEl || pageEl.dataset.pageObserved) return;
            pageEl.dataset.pageObserved = 'true';
            var observer = new MutationObserver(function() 
            {
                window.schedulePageCheck();
            });
            observer.observe(pageEl, 
            {
                childList: true, subtree: true, characterData: true
            });
        }

        // Setup observers on all pages
        function setupAllPageObservers() 
        {
            document.querySelectorAll('.page').forEach(setupPageObserver);
        }

        window.addEventListener('resize', function() { checkAllPages(); });

        // ================================================================
        //  5. ADVANCED KEYBOARD HANDLER
        //     Fixes: Backspace, Delete, arrows, Enter, Ctrl+A, Home/End
        // ================================================================
        (function() 
        {
           function isNonEditable(node)
           {
                if (!node) return false;

                if (node.nodeType === 3) node = node.parentElement;

                if (!node || node.nodeType !== 1) return false;

                if (node.classList.contains('math-formula'))  return true;

                if (
                    node.classList.contains('katex') ||
                    node.classList.contains('katex-error') ||
                    node.classList.contains('img-wrapper') ||
                    node.getAttribute('contenteditable') === 'false'
                )
                    return true;

                var kw = node.closest('span[direction="ltr"]');

                if (kw && kw.querySelector('.katex')) return true;

                return false;
            }
            
            function findNonEditableAncestor(node) 
            {
                // Text nodes don't have classList — start from parent element
                if (node && node.nodeType === 3) node = node.parentElement;
                while (node && !node.classList.contains('page')) 
                {
                    if (isNonEditable(node)) return node;
                    node = node.parentElement;
                }
                return null;
            }

            function getNodeBefore(range) 
            {
                var node = range.startContainer;
                var offset = range.startOffset;

                if (node.nodeType === 3) 
                {
                    if (offset > 0) return null;
                }
                else 
                {
                    if (offset > 0) 
                    {
                        var prev = node.childNodes[offset - 1];
                        while (prev && prev.nodeType === 1 && prev.lastChild) prev = prev.lastChild;
                        return prev;
                    }
                }

                while (node && node !== document) 
                {
                    if (node.previousSibling) 
                    {
                        node = node.previousSibling;
                        while (node && node.nodeType === 1 && node.lastChild) node = node.lastChild;
                        return node;
                    }
                    node = node.parentNode;
                }
                return null;
            }

            function getNodeAfter(range) 
            {
                var node = range.endContainer;
                var offset = range.endOffset;

                if (node.nodeType === 3) 
                {
                    if (offset < node.textContent.length) return null;
                }
                else 
                {
                    if (offset < node.childNodes.length) 
                    {
                        var next = node.childNodes[offset];
                        while (next && next.nodeType === 1 && next.firstChild) next = next.firstChild;
                        return next;
                    }
                }

                while (node && node !== document) 
                {
                    if (node.nextSibling) 
                    {
                        node = node.nextSibling;
                        while (node && node.nodeType === 1 && node.firstChild) node = node.firstChild;
                        return node;
                    }
                    node = node.parentNode;
                }
                return null;
            }

            // Check if cursor is at the very first position of the page 
            function isAtPageStart(rng, pg) 
            {
                try 
                {
                    var test = document.createRange();
                    test.setStart(pg, 0);
                    test.setEnd(rng.startContainer, rng.startOffset);
                    // No text before cursor → at page start
                    return test.toString().replace(/[\s\u200B\u00A0]/g, '').length === 0;
                } catch(e) { return false; }
            }

            // Check if cursor is at the very last position of the page 
            function isAtPageEnd(rng, pg) 
            {
                try 
                {
                    var test = document.createRange();
                    test.setStart(rng.endContainer, rng.endOffset);
                    test.setEnd(pg, pg.childNodes.length);
                    // No text after cursor → at page end
                    return test.toString().replace(/[\s\u200B\u00A0]/g, '').length === 0;
                } catch(e) { return false; }
            }

            function moveCursorAfter(node) 
            {
                var sel = window.getSelection();
                if (!sel.rangeCount) return;
                var range = document.createRange();
                range.setStartAfter(node);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            }

            function moveCursorBefore(node) 
            {
                var sel = window.getSelection();
                if (!sel.rangeCount) return;
                var range = document.createRange();
                range.setStartBefore(node);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            }

            // Remove all non-editable nodes that the range overlaps.
            function removeNonEditablesInRange(range) 
            {
                if (!range) return false;
                var removed = false;
                var walker  = document.createTreeWalker(range.commonAncestorContainer, NodeFilter.SHOW_ELEMENT, 
                {
                    acceptNode: function(n) 
                    {
                        return isNonEditable(n) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP;
                    }
                });
                var toRemove = [];
                while (walker.nextNode()) 
                {
                    var n = walker.currentNode;
                    if (range.intersectsNode(n)) toRemove.push(n);
                }
                toRemove.forEach(function(n) 
                {
                    if (n.parentNode) n.parentNode.removeChild(n);
                    removed = true;
                });
                return removed;
            }

            document.addEventListener('keydown', function(e) 
            {
                var page = document.activeElement && 
                           document.activeElement.classList.contains('page') ? 
                           document.activeElement : null;
                
                if (!page) return;

                var sel = window.getSelection();

                if (!sel.rangeCount) return;

                var range     = sel.getRangeAt(0);
                var collapsed = range.collapsed;

                // -- CTRL+A: select all content across all pages --
                if (e.key.toLowerCase() === 'a' && (e.ctrlKey || e.metaKey) && !e.shiftKey) 
                {
                    e.preventDefault();
                    var pages = document.querySelectorAll('.page');
                    if (pages.length > 0) 
                    {
                        var r = document.createRange();
                        r.setStart(pages[0], 0);
                        r.setEnd(pages[pages.length - 1], pages[pages.length - 1].childNodes.length);
                        sel.removeAllRanges();
                        sel.addRange(r);
                    }
                    return;
                }

                // -- UNDO / REDO --
                if ((e.key.toLowerCase() === 'z' && (e.ctrlKey || e.metaKey)) ||
                    (e.key.toLowerCase() === 'y' && (e.ctrlKey || e.metaKey))) 
                {
                    e.preventDefault();
                    if (e.key.toLowerCase() === 'y' || e.shiftKey) 
                        document.execCommand('redo', false, null);
                    else 
                        document.execCommand('undo', false, null);
                    return;
                }

                // -- BACKSPACE --
                if (e.key === 'Backspace' || e.key === 'Delete') 
                {
                    // Handle non-editable elements
                    if (collapsed) 
                    {
                        var nodeBefore = getNodeBefore(range);
                        
                        if (isNonEditable(nodeBefore)) 
                        {
                            e.preventDefault();
                            nodeBefore.parentNode.removeChild(nodeBefore);
                        }
                    }
                    else 
                    {
                        if (removeNonEditablesInRange(range)) 
                        {
                            e.preventDefault();
                            document.execCommand('delete', false, null);
                        }
                    }
                    // After any backspace, do full reflow: clean empty elements, push/pull content, remove empty pages
                    setTimeout(function()
                    {
                        var pages = document.querySelectorAll('.page');

                        for (var i = 0; i < pages.length; i++) pushOverflow(pages[i]);

                        for (var i = pages.length - 2; i >= 0; i--) pullUnderflow(pages[i]);

                        removeEmptyPagesAndFixFocus();

                    }, 50);                    
                }
                 
                // -- ARROW LEFT / RIGHT --
                if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && collapsed) 
                {
                    requestAnimationFrame(function() 
                    {
                        var sel2 = window.getSelection();
                        if (!sel2.rangeCount) return;
                        var rng   = sel2.getRangeAt(0);
                        var nonEd = findNonEditableAncestor(rng.commonAncestorContainer);

                        if (nonEd) 
                        {
                            if (e.key === 'ArrowRight') moveCursorAfter(nonEd);
                            else moveCursorBefore(nonEd);
                        }
                    });
                }

                // -- ARROW UP / DOWN --
                if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && collapsed) 
                {
                    requestAnimationFrame(function() 
                    {
                        var sel2 = window.getSelection();

                        if (!sel2.rangeCount) return;
                        var rng   = sel2.getRangeAt(0);
                        var nonEd = findNonEditableAncestor(rng.commonAncestorContainer);
                        if (nonEd)
                        {
                            if (e.key === 'ArrowDown') moveCursorAfter(nonEd);
                            else moveCursorBefore(nonEd);
                        }
                    });
                }

                // -- ENTER --
                if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.altKey && !e.metaKey) 
                {
                    e.preventDefault();

                    var container = sel.anchorNode;
                    if (container && container.nodeType === 3) container = container.parentElement;
                    var nonEd = findNonEditableAncestor(container);
                    
                    if (nonEd) 
                    {
                        moveCursorAfter(nonEd);
                        sel   = window.getSelection();
                        range = sel.getRangeAt(0);
                    }

                    var currentBlock = range.startContainer;
                    while (currentBlock && currentBlock !== page) 
                    {
                        if (currentBlock.nodeType === 1 && /^(DIV|P|LI)$/.test(currentBlock.tagName)) break;
                        currentBlock = currentBlock.parentElement;
                    }

                    var insertAfter = false;
                    if (currentBlock && currentBlock !== page) 
                    {
                        var inner = currentBlock.innerHTML.replace(/<br\s*\/?>/gi, '').trim();
                        if (inner === '') insertAfter = true;
                    }

                    // Inside a list item: let the browser handle for proper list behaviour
                    if (currentBlock && currentBlock.tagName === 'LI') 
                    {
                        document.execCommand('insertHTML', false, '<br>');
                        return;
                    }

                    var div = document.createElement('div');
                    div.innerHTML = '<br>';

                    range = sel.getRangeAt(0);
                    range.deleteContents();

                    if (insertAfter && currentBlock && currentBlock.parentNode)
                        currentBlock.parentNode.insertBefore(div, currentBlock.nextSibling);
                    else
                        range.insertNode(div);

                    range.setStart(div, 0);
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);

                }

                // -- HOME / END --
                if (e.key === 'Home' || e.key === 'End') 
                {
                    requestAnimationFrame(function() 
                    {
                        var sel2 = window.getSelection();
                        if (!sel2.rangeCount) return;
                        var rng   = sel2.getRangeAt(0);
                        var nonEd = findNonEditableAncestor(rng.commonAncestorContainer);
                        if (nonEd) 
                        {
                            if (e.key === 'Home') moveCursorBefore(nonEd);
                            else moveCursorAfter(nonEd);
                        }
                    });
                }

                // -- BACKSPACE at start of non-first page --
                if (e.key === 'Backspace' && collapsed) 
                {
                    if (isAtPageStart(range, page)) 
                    {
                        var prev = page.previousElementSibling;
                        if (prev && prev.classList.contains('page')) 
                        {
                            e.preventDefault();
                            // If current page is empty, merge into previous
                            if (isPageEmpty(page)) 
                            {
                                page.remove();
                                prev.focus();
                                var sel2 = window.getSelection();
                                var r2 = document.createRange();
                                r2.selectNodeContents(prev);
                                r2.collapse(false);
                                sel2.removeAllRanges();
                                sel2.addRange(r2);
                            } else 
                            {
                                prev.focus();
                                var sel2 = window.getSelection();
                                var r2 = document.createRange();
                                r2.selectNodeContents(prev);
                                r2.collapse(false);
                                sel2.removeAllRanges();
                                sel2.addRange(r2);
                            }
                            if (typeof schedulePageCheck === 'function') schedulePageCheck();
                            return;
                        }
                    }
                }

                // -- DELETE at end of non-last page --
                if (e.key === 'Delete' && collapsed) 
                {
                    if (isAtPageEnd(range, page)) 
                    {
                        var nxt = page.nextElementSibling;
                        if (nxt && nxt.classList.contains('page')) 
                        {
                            e.preventDefault();
                            // If next page is empty, remove it instead of moving cursor
                            if (isPageEmpty(nxt)) 
                            {
                                nxt.remove();
                            } else 
                            {
                                nxt.focus();
                                var sel3 = window.getSelection();
                                var r3 = document.createRange();
                                r3.selectNodeContents(nxt);
                                r3.collapse(true);
                                sel3.removeAllRanges();
                                sel3.addRange(r3);
                            }
                            if (typeof schedulePageCheck === 'function') schedulePageCheck();
                            return;
                        }
                    }
                }

                // -- ARROW DOWN at bottom of page → next page --
                if (e.key === 'ArrowDown' && collapsed) 
                {
                    requestAnimationFrame(function() 
                    {
                        var sel4 = window.getSelection();
                        if (!sel4.rangeCount) return;
                        var focusNode = sel4.focusNode;
                        var currentPage = focusNode && focusNode.closest ? focusNode.closest('.page') : null;
                        if (!currentPage) return;
                        // Check if cursor is at the last line
                        var r4 = sel4.getRangeAt(0);
                        var rect = r4.getBoundingClientRect();
                        var pageRect = currentPage.getBoundingClientRect();
                        if (rect.bottom >= pageRect.bottom - 5) 
                        {
                            var nextP = currentPage.nextElementSibling;
                            if (nextP && nextP.classList.contains('page')) 
                            {
                                nextP.focus();
                            }
                        }
                    });
                }

                // -- ARROW UP at top of page → previous page --
                if (e.key === 'ArrowUp' && collapsed) 
                {
                    requestAnimationFrame(function() 
                    {
                        var sel5 = window.getSelection();
                        if (!sel5.rangeCount) return;
                        var focusNode2 = sel5.focusNode;
                        var currentPage2 = focusNode2 && focusNode2.closest ? focusNode2.closest('.page') : null;
                        if (!currentPage2) return;
                        var r5 = sel5.getRangeAt(0);
                        var rect2 = r5.getBoundingClientRect();
                        var pageRect2 = currentPage2.getBoundingClientRect();
                        if (rect2.top <= pageRect2.top + 5) 
                        {
                            var prevP = currentPage2.previousElementSibling;
                            if (prevP && prevP.classList.contains('page')) 
                            {
                                prevP.focus();
                            }
                        }
                    });
                }
            });
        })();
        
        function renderMathFormula(element)
        {
            if (!window.katex) return; 

            const latex = element.dataset.latex || '';

            const displayMode = element.dataset.display === 'block';
            try
            {
                katex.render(latex, element,
                {
                    throwOnError:false,
                    displayMode:displayMode
                });
            }
    catch(err)
    {
        console.error(err);
    }
        }


        function renderAllMathFormulas()
        {
            document.querySelectorAll('.math-formula').forEach(renderMathFormula);
        }

        
        function createMathFormula(latex, displayMode)
        {
            const span = document.createElement('span');
            
            span.title = 'double click to Edit';
            span.className = 'math-formula';
            span.direction = 'ltr';
            span.contentEditable = 'false';
            span.dataset.latex = latex;
            span.dataset.display = displayMode ? 'block' : 'inline';
            
            
            const page = document.querySelector('.page');
            
            if (page.style.contentEditable ==='false') 
            {
                span.title ='';
            }

            renderMathFormula(span);

            return span;
        }

        // double click => edit latex
        document.addEventListener('dblclick', function(e)
        {
            
            const page = document.querySelector('.page');
                        
            // Ignore editing when the document is readonly.
            if (page.contentEditable ==='false') return; 

            const formula = e.target.closest('.math-formula');
            
            if (!formula) return;

            const latex = formula.dataset.latex || '';
            

            const editor = document.createElement('input');

            editor.className = 'math-editor';
            editor.type = 'text';
            editor.spellcheck='false';
            editor.autocomplete='off';
            editor.direction = 'ltr';
            
            editor.value = latex;

            formula.replaceWith(editor);

            editor.focus();
            const len = editor.value.length;
            editor.setSelectionRange(len, len);

            function finishEdit()
            {
        
                const newLatex = editor.value.trim();
                const newFormula =
                    createMathFormula(
                        newLatex,
                        formula.dataset.display === 'block'
                    );

                editor.replaceWith(newFormula);

                renderMathFormula(newFormula);

                schedulePageCheck();
            }

            editor.addEventListener('keydown', function(ev)
            {
                if (ev.key === 'Enter')
                {
                    ev.preventDefault();

                    editor.removeEventListener('blur', finishEdit);

                    finishEdit();
                }

                if (ev.key === 'Escape')
                {
                    ev.preventDefault();

                    editor.removeEventListener('blur', finishEdit);

                    finishEdit();
                }
            });

            editor.addEventListener('blur', finishEdit, { once:true }
            );
        });

        document.addEventListener('DOMContentLoaded', function()
        {
            renderAllMathFormulas();
        });

        // ================================================================
        //  DIRTY FLAG BRIDGE
        //  The JS 'input' event fires on user edits (typing, deleting,
        //  formatting via execCommand, pasting, etc.) but NOT on
        //  programmatic DOM changes (page rebalancing, KaTeX rendering).
        //  We set document.title to signal Python via titleChanged.
        // ================================================================
        document.addEventListener('input', function() 
        {
            document.title = '__edit__' + Date.now();
        });

        </script>
